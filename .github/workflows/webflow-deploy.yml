name: Webflow CDN Auto Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'home/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build reference head code
        run: |
          node <<'EOF' > /tmp/head_cdn.txt
          const base = 'https://cdn.jsdelivr.net/gh/pookat73-prog/helixamc-webflow@main';
          process.stdout.write([
            '<!-- GSAP -->',
            '<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>',
            '',
            '<!-- Section 1 Hero Animation -->',
            `<link rel="stylesheet" href="${base}/home/section1/section1.css">`,
            `<script src="${base}/home/section1/section1.js"></script>`,
            '',
            '<!-- Section Divider (S1 → S2) -->',
            `<link rel="stylesheet" href="${base}/home/section-divider/divider.css">`,
            `<script src="${base}/home/section-divider/divider.js"></script>`,
            '',
            '<!-- Global Button Glow -->',
            `<link rel="stylesheet" href="${base}/home/global/buttons.css">`,
            `<script src="${base}/home/global/buttons.js"></script>`,
          ].join('\n'));
          EOF
          echo "--- Generated head code ---"
          cat /tmp/head_cdn.txt
          echo ""
          echo "---"

      - name: Purge jsDelivr cache
        run: |
          BASE="https://purge.jsdelivr.net/gh/pookat73-prog/helixamc-webflow@main"
          FILES=(
            "home/section1/section1.css"
            "home/section1/section1.js"
            "home/section-divider/divider.css"
            "home/section-divider/divider.js"
            "home/global/buttons.css"
            "home/global/buttons.js"
          )
          FAILED=0
          for f in "${FILES[@]}"; do
            printf "Purging /%s → " "$f"
            code=$(curl -s -o /tmp/purge_out.txt -w "%{http_code}" "${BASE}/${f}")
            echo "HTTP $code"
            if [ "$code" != "200" ]; then
              echo "  body: $(cat /tmp/purge_out.txt)"
              FAILED=$((FAILED + 1))
            fi
          done
          if [ $FAILED -gt 0 ]; then
            echo "⚠️ $FAILED 개 파일 퍼지 실패 (수 분 후 재시도 가능)"
          else
            echo "✅ 모든 파일 CDN 캐시 퍼지 완료"
          fi

      - name: Summary
        if: always()
        run: |
          {
            echo "## ✅ CDN Auto Deploy"
            echo ""
            echo "커밋: \`${{ github.sha }}\`"
            echo ""
            echo "변경된 파일은 몇 초 내로 jsDelivr → Webflow 사이트에 자동 반영됩니다."
            echo ""
            echo "---"
            echo ""
            echo "### 📌 **최초 1회만** 아래 코드를 Webflow 홈 페이지 → Page Settings → Inside \`<head>\` tag 에 붙여넣으세요"
            echo ""
            echo '```html'
            cat /tmp/head_cdn.txt
            echo ""
            echo '```'
            echo ""
            echo "붙여넣은 후 Webflow에서 **한 번만 Publish**. 이후 코드 수정은 이 워크플로우가 자동 반영."
          } >> $GITHUB_STEP_SUMMARY
