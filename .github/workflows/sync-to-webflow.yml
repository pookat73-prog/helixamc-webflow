name: Sync to Webflow

on:
  push:
    branches:
      - main
    paths:
      - 'home/section1/**'
      - 'home/global/**'

jobs:
  sync-homepage:
    name: Sync homepage head code (Section 1 + Global Buttons)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build head_code
        run: |
          cat > /tmp/build-code.js << 'EOF'
          const fs = require('fs');

          const cssFile = fs.readFileSync('home/section1/section1.css', 'utf-8');
          const jsFile  = fs.readFileSync('home/section1/section1.js',  'utf-8');

          const headCode =
            `<!-- Section 1 Hero Animation -->\n` +
            `<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>\n` +
            `<style>\n${cssFile}\n</style>\n` +
            `<script>\n${jsFile}\n</script>\n\n` +
            `<!-- Global Button Glow -->\n` +
            `<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/pookat73-prog/helixamc-webflow@latest/home/global/buttons.css">\n` +
            `<script src="https://cdn.jsdelivr.net/gh/pookat73-prog/helixamc-webflow@latest/home/global/buttons.js"></script>`;

          console.log(JSON.stringify(headCode));
          EOF
          node /tmp/build-code.js > /tmp/head_code.json

      - name: Update Webflow Page Custom Code
        run: |
          head_code=$(cat /tmp/head_code.json)
          curl -X PATCH \
            "https://api.webflow.com/v1/sites/${{ secrets.WEBFLOW_SITE_ID }}/pages/${{ secrets.WEBFLOW_PAGE_ID }}" \
            -H "Authorization: Bearer ${{ secrets.WEBFLOW_API_TOKEN }}" \
            -H "accept-version: 1.0.0" \
            -H "Content-Type: application/json" \
            -d "{\"head_code\": $head_code}" \
            --fail

      - name: Notify Success
        if: success()
        run: |
          echo "✅ Webflow homepage updated: Section 1 + Global Buttons"

  sync-site-global-buttons:
    name: Sync site-wide head code (Global Buttons)
    runs-on: ubuntu-latest

    steps:
      - name: Update Webflow Site-wide Custom Code
        run: |
          cat > /tmp/site-head.json << 'EOF'
          {
            "customCode": {
              "headCode": "<!-- Global Button Glow -->\n<link rel=\"stylesheet\" href=\"https://cdn.jsdelivr.net/gh/pookat73-prog/helixamc-webflow@latest/home/global/buttons.css\">\n<script src=\"https://cdn.jsdelivr.net/gh/pookat73-prog/helixamc-webflow@latest/home/global/buttons.js\"></script>"
            }
          }
          EOF
          curl -X PATCH \
            "https://api.webflow.com/v1/sites/${{ secrets.WEBFLOW_SITE_ID }}" \
            -H "Authorization: Bearer ${{ secrets.WEBFLOW_API_TOKEN }}" \
            -H "accept-version: 1.0.0" \
            -H "Content-Type: application/json" \
            -d @/tmp/site-head.json \
            --fail

      - name: Notify Success
        if: success()
        run: |
          echo "✅ Webflow site-wide head updated: Global Buttons"
