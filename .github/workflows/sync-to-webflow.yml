name: Sync to Webflow

on:
  push:
    branches:
      - main
    paths:
      - 'home/section1/**'

jobs:
  sync-to-webflow:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Read CSS file
        id: read-css
        run: |
          css_content=$(cat home/section1/section1.css)
          # Escape for JSON
          css_content="${css_content//'%'/'%25'}"
          css_content="${css_content//$'\n'/'%0A'}"
          css_content="${css_content//$'\r'/'%0D'}"
          echo "css_content=$css_content" >> $GITHUB_OUTPUT

      - name: Read JS file
        id: read-js
        run: |
          js_content=$(cat home/section1/section1.js)
          # Escape for JSON
          js_content="${js_content//'%'/'%25'}"
          js_content="${js_content//$'\n'/'%0A'}"
          js_content="${js_content//$'\r'/'%0D'}"
          echo "js_content=$js_content" >> $GITHUB_OUTPUT

      - name: Build head_code
        id: build-code
        env:
          CSS_CONTENT: ${{ steps.read-css.outputs.css_content }}
          JS_CONTENT: ${{ steps.read-js.outputs.js_content }}
        run: |
          cat > /tmp/build-code.js << 'EOF'
          const fs = require('fs');
          
          const cssFile = fs.readFileSync('home/section1/section1.css', 'utf-8');
          const jsFile = fs.readFileSync('home/section1/section1.js', 'utf-8');
          
          const headCode = `<!-- Section 1 Hero Animation -->
          <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
          <style>
          ${cssFile}
          </style>
          <script>
          ${jsFile}
          </script>`;
          
          console.log(JSON.stringify(headCode));
          EOF
          
          node /tmp/build-code.js > /tmp/head_code.json

      - name: Update Webflow Custom Code
        run: |
          head_code=$(cat /tmp/head_code.json)
          
          curl -X PATCH \
            "https://api.webflow.com/v1/sites/${{ secrets.WEBFLOW_SITE_ID }}/pages/${{ secrets.WEBFLOW_PAGE_ID }}" \
            -H "Authorization: Bearer ${{ secrets.WEBFLOW_API_TOKEN }}" \
            -H "accept-version: 1.0.0" \
            -H "Content-Type: application/json" \
            -d "{\"head_code\": $head_code}" \
            --fail

      - name: Notify Success
        if: success()
        run: |
          echo "✅ Webflow Custom Code updated successfully!"
          echo "🔄 Changes synced: Section1 CSS & JS"
